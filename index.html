<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon/favicon-kol-ds.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>kol-chess</title>
    <!-- Theme boot: stamp data-theme before paint so a saved choice applies
         everywhere (the ThemeToggle only mounts inside the archive overlay, so
         its own re-stamp can't run on load) and the explicit attr wins over
         kol-framework getInitialTheme's matchMedia seed. Key/values match
         @kolkrabbi/kol-framework theme.js (THEME_STORAGE_KEY 'kol-theme'). -->
    <script>
      try {
        var t = localStorage.getItem('kol-theme');
        document.documentElement.dataset.theme = t === 'dark' || t === 'light' ? t : 'light';
      } catch (e) {
        document.documentElement.dataset.theme = 'light';
      }
    </script>
    <!-- Umami analytics — uncomment to opt in -->
    <!-- <script defer src="https://analytics.example.com/script.js" data-website-id="YOUR_WEBSITE_ID"></script> -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
